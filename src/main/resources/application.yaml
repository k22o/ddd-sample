spring:
  application:
    name: ddd-sample
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

client:
  connect-timeout: 1s
  read-timeout: 1s
  payment:
    base-url: http://localhost:9001
  inventory:
    base-url: http://localhost:9002
